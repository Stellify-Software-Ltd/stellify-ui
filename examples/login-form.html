<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form — @stellify/ui Example</title>

  <!-- Design tokens -->
  <link rel="stylesheet" href="../dist/tokens/base.css">
  <link rel="stylesheet" href="../dist/tokens/themes/shadcn.css">

  <!-- Web Components (registers <s-form>, <s-field>, etc.) -->
  <script type="module" src="../dist/stellify-ui.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: var(--s-font-ui);
      font-size: var(--s-type-body);
      background: var(--s-bg-canvas);
      color: var(--s-fg-primary);
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--s-s-4);
    }

    .card {
      background: var(--s-bg-surface);
      border: 1px solid var(--s-rule);
      border-radius: var(--s-r-4);
      padding: var(--s-s-6);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: var(--s-type-h1);
      margin: 0 0 var(--s-s-2);
    }

    .subtitle {
      color: var(--s-fg-tertiary);
      margin: 0 0 var(--s-s-5);
    }

    .form-alert {
      background: hsl(0 72% 50% / 0.1);
      border: 1px solid var(--s-negative);
      color: var(--s-negative);
      padding: var(--s-s-3) var(--s-s-4);
      border-radius: var(--s-r-2);
      font-size: var(--s-type-small);
      margin-bottom: var(--s-s-4);
      display: none;
    }

    .form-alert[active] {
      display: block;
    }

    .field {
      margin-bottom: var(--s-s-4);
    }

    label {
      display: block;
      font-size: var(--s-type-ui);
      font-weight: 500;
      margin-bottom: var(--s-s-1);
    }

    input {
      width: 100%;
      padding: var(--s-s-2) var(--s-s-3);
      font-size: var(--s-type-body);
      font-family: inherit;
      border: 1px solid var(--s-rule);
      border-radius: var(--s-r-2);
      background: var(--s-bg-canvas);
      color: var(--s-fg-primary);
      transition: border-color var(--s-d-quick) var(--s-ease-out),
                  box-shadow var(--s-d-quick) var(--s-ease-out);
    }

    input:focus {
      outline: none;
      border-color: var(--s-action);
      box-shadow: 0 0 0 3px var(--s-focus-ring);
    }

    input[aria-invalid="true"] {
      border-color: var(--s-negative);
    }

    input[aria-invalid="true"]:focus {
      box-shadow: 0 0 0 3px hsl(0 72% 50% / 0.2);
    }

    .error-message {
      display: none;
      color: var(--s-negative);
      font-size: var(--s-type-small);
      margin-top: var(--s-s-1);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: var(--s-s-7);
    }

    .reveal-btn {
      position: absolute;
      right: var(--s-s-2);
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: var(--s-s-1);
      cursor: pointer;
      color: var(--s-fg-tertiary);
      border-radius: var(--s-r-1);
    }

    .reveal-btn:hover {
      color: var(--s-fg-primary);
      background: var(--s-bg-hover);
    }

    button[type="submit"] {
      width: 100%;
      padding: var(--s-s-3) var(--s-s-4);
      font-size: var(--s-type-ui);
      font-weight: 500;
      font-family: inherit;
      background: var(--s-action);
      color: var(--s-action-fg);
      border: none;
      border-radius: var(--s-r-2);
      cursor: pointer;
      transition: opacity var(--s-d-quick) var(--s-ease-out);
    }

    button[type="submit"]:hover:not([disabled]) {
      opacity: 0.9;
    }

    button[type="submit"][disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button[type="submit"][loading]::after {
      content: " ...";
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to continue</p>

    <s-form>
      <form action="/login" method="POST">
        <div data-form-alert class="form-alert"></div>

        <s-field class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="you@example.com"
          >
          <div data-error class="error-message" style="display: none;">
            <p></p>
          </div>
        </s-field>

        <s-field class="field">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="Enter your password"
            >
            <button type="button" data-reveal class="reveal-btn" aria-label="Show password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div data-error class="error-message" style="display: none;">
            <p></p>
          </div>
        </s-field>

        <button type="submit">Sign in</button>
      </form>
    </s-form>
  </div>
</body>
</html>
